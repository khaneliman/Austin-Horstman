<div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
  @for (project of projects; track project.company) {
    <div
      class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-stone-200 dark:border-slate-700 overflow-hidden hover:shadow-lg transition-all duration-300 hover:-translate-y-0.5 flex flex-col h-full"
    >
      <!-- Company Header -->
      <div class="relative px-8 py-10 bg-slate-950">
        <app-decorative-background [elements]="backgroundElements"></app-decorative-background>
        <div class="relative z-10">
          <div
            class="w-20 h-20 rounded-xl p-3 mx-auto mb-4 shadow-2xl overflow-hidden"
            [ngClass]="{
              'bg-white': project.logoBackground === 'white',
              'bg-gray-900': project.logoBackground === 'dark',
              'bg-black': project.logoBackground === 'black',
            }"
            [style.background]="getLogoBackgroundStyle(project.logoBackground)"
          >
            <img class="w-full h-full object-contain" [src]="project.logo" [alt]="project.company + ' logo'" />
          </div>
          <h3 class="text-2xl font-bold text-white mb-2">
            {{ project.title }}
          </h3>
          <p class="text-slate-200">{{ project.description }}</p>
        </div>
      </div>

      <!-- Projects List -->
      <div class="p-8" style="display: flex; flex-direction: column; flex-grow: 1">
        <div style="flex-grow: 1">
          <h4 class="text-lg font-semibold text-slate-800 dark:text-slate-100 mb-4">Featured Projects:</h4>
          <div class="space-y-3 mb-6">
            @for (proj of project.projects; track proj.name) {
              <div
                class="flex items-center justify-between p-3 bg-stone-50 dark:bg-slate-800 rounded-lg hover:bg-stone-100 dark:hover:bg-slate-700 transition-colors"
              >
                <span class="text-slate-700 dark:text-slate-200 font-medium">{{ proj.name }}</span>
                <a
                  [routerLink]="proj.route"
                  class="text-teal-800 dark:text-teal-200 hover:text-teal-950 dark:hover:text-teal-100 text-sm font-medium"
                >
                  View Details →
                </a>
              </div>
            }
          </div>
        </div>

        <div class="flex gap-3 mt-auto">
          <a
            [routerLink]="project.route"
            class="flex-1 bg-teal-700 hover:bg-teal-800 text-white px-6 py-3 rounded-lg font-semibold text-center hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200"
          >
            View All Projects
          </a>
          @if (showCompanyInfo) {
            <a
              [routerLink]="getCompanyRoute(project.company)"
              class="px-6 py-3 border-2 border-stone-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 rounded-lg font-semibold hover:border-stone-300 dark:hover:border-slate-500 hover:bg-stone-50 dark:hover:bg-slate-800 transition-all duration-200"
            >
              Company Info
            </a>
          }
        </div>
      </div>
    </div>
  }
</div>
