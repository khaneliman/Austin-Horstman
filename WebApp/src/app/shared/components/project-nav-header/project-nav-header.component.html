<!-- Project Navigation Header -->
<div class="sticky top-16 z-40 border-b border-gray-200 bg-white dark:border-gray-700 dark:bg-gray-800">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3">
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <!-- Left: Back Navigation -->
      <div class="flex items-center space-x-4">
        <a [routerLink]="backRoute()" [class]="backLinkClasses">
          <ng-icon name="heroChevronLeft" size="1rem" class="mr-2"></ng-icon>
          {{ backLabel() }}
        </a>
      </div>

      <!-- Right: Project Quick Nav -->
      @if (projects.length > 0) {
        <div class="project-nav-header__quick-nav w-full min-w-0 md:w-auto">
          <div
            class="project-nav-header__quick-nav-scroll -mx-1 flex snap-x items-center gap-2 overflow-x-auto px-1 pb-1 pr-8 md:mx-0 md:overflow-visible md:pb-0 md:pr-0"
            aria-label="Project quick navigation"
          >
            @for (project of projects; track project.route) {
              <a
                [routerLink]="project.route"
                [class]="project.isActive ? activeTabClasses : inactiveTabClasses"
                [attr.aria-current]="project.isActive ? 'page' : null"
              >
                {{ project.name }}
              </a>
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>
