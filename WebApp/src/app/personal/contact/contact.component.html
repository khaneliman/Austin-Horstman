<main class="min-h-screen relative bg-[#f7f3ea] dark:bg-slate-950">
  <!-- Hero Section -->
  <app-hero-section
    class="block pt-16 bg-slate-950"
    [title]="heroTitle"
    [subtitle]="heroSubtitle"
    variant="gradient"
    size="sm"
    alignment="center"
    backgroundGradient="from-slate-950 via-slate-900 to-teal-950"
    [backgroundElements]="backgroundElements"
    minHeight="min-h-auto"
    textColor="light"
    [showContentSlot]="true"
  >
    <!-- Personal Skills grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 mt-2">
      @for (skill of personalSkills; track skill.title) {
        <div class="text-center">
          <div
            class="w-14 h-14 bg-white/10 rounded-xl flex items-center justify-center border border-white/15 shadow-lg mx-auto mb-3 group hover:scale-105 transition-transform duration-300"
          >
            <ng-icon [name]="skill.icon" size="1.25rem" color="rgb(153 246 228)"></ng-icon>
          </div>
          <h5 class="text-lg font-bold text-white mb-2">{{ skill.title }}</h5>
          <p class="text-slate-200 text-sm leading-snug">
            {{ skill.description }}
          </p>
        </div>
      }
    </div>
  </app-hero-section>

  <!-- Wave separator -->
  <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none z-20">
    <svg
      class="relative block w-full h-20"
      data-name="Layer 1"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 1200 120"
      preserveAspectRatio="none"
    >
      <path
        d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"
        class="fill-[#f7f3ea] dark:fill-slate-950"
      ></path>
    </svg>
  </div>

  <!-- Contact Form Section -->
  <section class="py-20 bg-[#f7f3ea] dark:bg-slate-950 relative -mt-20">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="relative">
        <!-- Contact form card -->
        <div
          class="bg-white dark:bg-slate-900 rounded-xl shadow-sm p-8 lg:p-12 border border-stone-200 dark:border-slate-700"
        >
          <div class="text-center mb-8">
            <h4 class="text-3xl font-bold text-slate-950 dark:text-slate-50 mb-4">Want to work with me?</h4>
            <p class="text-xl text-slate-600 dark:text-slate-300">Your project is very important to me.</p>
          </div>

          <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <!-- Name input -->
            <app-form-input
              label="Your Name"
              type="text"
              placeholder="Your name"
              leadingIcon="heroUserPlus"
              formControlName="name"
              [required]="true"
            ></app-form-input>

            <!-- Email input -->
            <app-form-input
              label="Email Address"
              type="email"
              placeholder="your.email@example.com"
              leadingIcon="heroEnvelope"
              formControlName="email"
              [required]="true"
            ></app-form-input>

            <!-- Message textarea -->
            <app-form-input
              label="Message"
              type="textarea"
              placeholder="Tell me about your project..."
              formControlName="message"
              [rows]="6"
              [required]="true"
            ></app-form-input>

            <!-- Submit button -->
            <div class="pt-4">
              <button
                type="submit"
                (click)="onSubmit()"
                [disabled]="contactForm.invalid"
                class="w-full bg-teal-700 hover:bg-teal-800 text-white font-semibold py-4 px-8 rounded-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center space-x-3 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
              >
                <ng-icon name="heroPaperAirplane" size="1.25rem"></ng-icon>
                <span class="text-lg">Send Message</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>
