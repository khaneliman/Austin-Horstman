@if (location() === 'nav') {
  <div class="flex items-center space-x-2">
    @for (site of navSocialLinks(); track site.platform) {
      <a
        href="{{ site.link }}"
        target="_blank"
        rel="noopener noreferrer"
        title="{{ site.tooltip }}"
        [attr.aria-label]="site.tooltip"
        class="rounded-lg p-2 text-slate-600 transition-colors duration-200 hover:bg-stone-200/60 hover:text-teal-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-600 focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--color-surface)] dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-teal-200 dark:focus-visible:ring-offset-slate-950"
      >
        <ng-icon [name]="site.iconName" size="1.25rem"></ng-icon>
      </a>
    }
  </div>
}

@if (location() === 'footer') {
  <div class="flex justify-center space-x-4">
    @for (site of socialLinks(); track site.platform) {
      <a
        target="_blank"
        href="{{ site.link }}"
        rel="noopener noreferrer"
        title="{{ site.tooltip }}"
        [attr.aria-label]="site.tooltip"
        class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-stone-200 bg-[var(--color-surface-raised)] text-slate-600 shadow-sm transition-colors duration-200 hover:bg-teal-700 hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-600 focus-visible:ring-offset-2 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300 dark:focus-visible:ring-offset-slate-950"
      >
        <ng-icon [name]="site.iconName" size="1rem"></ng-icon>
      </a>
    }
  </div>
}
