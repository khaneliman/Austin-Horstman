<!-- Fixed navigation header -->
<nav
  class="fixed top-0 w-full z-50 border-b border-stone-200/80 bg-[#fbf8f1]/90 shadow-sm backdrop-blur-xl transition-all duration-200 dark:border-slate-800 dark:bg-slate-950/85"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Left side navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <!-- Home link -->
        <a
          [routerLink]="['/home']"
          [class]="getDesktopLinkClasses('/home', true)"
          [attr.aria-current]="isRouteActive('/home', true) ? 'page' : null"
        >
          Home
        </a>

        <!-- Personal dropdown -->
        <div class="relative">
          <button
            (click)="togglePersonalDropdown()"
            [class]="getDesktopDropdownButtonClasses('/personal')"
            [attr.aria-expanded]="isPersonalDropdownOpen()"
            aria-haspopup="true"
          >
            <span>Personal</span>
            <svg
              class="w-4 h-4 transition-transform duration-200"
              [class.rotate-180]="isPersonalDropdownOpen()"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Personal dropdown menu -->
          @if (isPersonalDropdownOpen()) {
            <div
              class="absolute left-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-lg ring-1 ring-gray-200 dark:ring-gray-700 py-2"
            >
              <a
                [routerLink]="['/personal/about']"
                (click)="closeDropdowns()"
                [class]="getDropdownLinkClasses('/personal/about', true)"
                [attr.aria-current]="isRouteActive('/personal/about', true) ? 'page' : null"
              >
                About
              </a>
              <a
                [routerLink]="['/personal/contact']"
                (click)="closeDropdowns()"
                [class]="getDropdownLinkClasses('/personal/contact', true)"
                [attr.aria-current]="isRouteActive('/personal/contact', true) ? 'page' : null"
              >
                Contact
              </a>
              <a
                [routerLink]="['/personal/resume']"
                (click)="closeDropdowns()"
                [class]="getDropdownLinkClasses('/personal/resume')"
                [attr.aria-current]="isRouteActive('/personal/resume') ? 'page' : null"
              >
                Resume
              </a>
            </div>
          }
        </div>

        <!-- Projects dropdown -->
        <div class="relative">
          <button
            (click)="toggleProjectsDropdown()"
            [class]="getDesktopDropdownButtonClasses('/projects')"
            [attr.aria-expanded]="isProjectsDropdownOpen()"
            aria-haspopup="true"
          >
            <span>Projects</span>
            <svg
              class="w-4 h-4 transition-transform duration-200"
              [class.rotate-180]="isProjectsDropdownOpen()"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Projects dropdown menu -->
          @if (isProjectsDropdownOpen()) {
            <div
              class="absolute left-0 mt-2 w-56 bg-white dark:bg-gray-800 rounded-xl shadow-lg ring-1 ring-gray-200 dark:ring-gray-700 py-2"
            >
              <a
                [routerLink]="['/projects']"
                (click)="closeDropdowns()"
                [class]="getDropdownLinkClasses('/projects', true, true)"
                [attr.aria-current]="isRouteActive('/projects', true) ? 'page' : null"
              >
                All Projects
              </a>
              <div class="border-t border-gray-100 dark:border-gray-700 my-2"></div>
              <a
                [routerLink]="['/projects/professional']"
                (click)="closeDropdowns()"
                [class]="getDropdownLinkClasses('/projects/professional')"
                [attr.aria-current]="isRouteActive('/projects/professional') ? 'page' : null"
              >
                Professional Projects
              </a>
              <a
                [routerLink]="['/projects/personal']"
                (click)="closeDropdowns()"
                [class]="getDropdownLinkClasses('/projects/personal')"
                [attr.aria-current]="isRouteActive('/projects/personal') ? 'page' : null"
              >
                Personal Projects
              </a>
            </div>
          }
        </div>
      </div>

      <!-- Right side - Search, theme toggle and social links -->
      <div class="hidden md:flex items-center space-x-3">
        <button
          type="button"
          (click)="openCommandPalette()"
          class="group inline-flex items-center gap-2 rounded-lg border border-stone-300/70 bg-white/60 px-2.5 py-1.5 text-xs font-medium text-slate-600 transition-colors duration-150 hover:border-teal-500/40 hover:text-teal-800 dark:border-slate-700 dark:bg-slate-900/40 dark:text-slate-300 dark:hover:border-teal-400/40 dark:hover:text-teal-200"
          aria-label="Open command palette"
        >
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"
            ></path>
          </svg>
          <span class="hidden lg:inline">Search</span>
          <kbd class="font-mono text-[10px] uppercase tracking-widest text-slate-400 dark:text-slate-500">⌘K</kbd>
        </button>
        <app-theme-toggle></app-theme-toggle>
        <app-social-links location="nav"></app-social-links>
      </div>

      <!-- Mobile menu button -->
      <div class="md:hidden flex items-center space-x-3">
        <app-theme-toggle></app-theme-toggle>
        <button
          (click)="toggleMobileMenu()"
          class="rounded-lg p-2 text-slate-700 transition-colors duration-200 hover:bg-stone-200/60 hover:text-teal-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-600 focus-visible:ring-offset-2 focus-visible:ring-offset-[#fbf8f1] dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-teal-300 dark:focus-visible:ring-offset-slate-950"
          [attr.aria-expanded]="isMobileMenuOpen()"
          aria-controls="mobile-navigation"
          aria-label="Toggle navigation menu"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (!isMobileMenuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            }
            @if (isMobileMenuOpen()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            }
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    @if (isMobileMenuOpen()) {
      <div
        id="mobile-navigation"
        class="md:hidden border-t border-stone-200/80 bg-[#fbf8f1] py-4 dark:border-slate-800 dark:bg-slate-950"
      >
        <div class="space-y-4">
          <!-- Mobile Home -->
          <a
            [routerLink]="['/home']"
            (click)="closeMobileMenu()"
            [class]="getMobileLinkClasses('/home', true)"
            [attr.aria-current]="isRouteActive('/home', true) ? 'page' : null"
          >
            Home
          </a>

          <!-- Mobile Personal -->
          <div>
            <div [class]="getMobileSectionLabelClasses('/personal')">Personal</div>
            <a
              [routerLink]="['/personal/about']"
              (click)="closeMobileMenu()"
              [class]="getMobileLinkClasses('/personal/about', true, true)"
              [attr.aria-current]="isRouteActive('/personal/about', true) ? 'page' : null"
            >
              About
            </a>
            <a
              [routerLink]="['/personal/contact']"
              (click)="closeMobileMenu()"
              [class]="getMobileLinkClasses('/personal/contact', true, true)"
              [attr.aria-current]="isRouteActive('/personal/contact', true) ? 'page' : null"
            >
              Contact
            </a>
            <a
              [routerLink]="['/personal/resume']"
              (click)="closeMobileMenu()"
              [class]="getMobileLinkClasses('/personal/resume', false, true)"
              [attr.aria-current]="isRouteActive('/personal/resume') ? 'page' : null"
            >
              Resume
            </a>
          </div>

          <!-- Mobile Projects -->
          <div>
            <div [class]="getMobileSectionLabelClasses('/projects')">Projects</div>
            <a
              [routerLink]="['/projects']"
              (click)="closeMobileMenu()"
              [class]="getMobileLinkClasses('/projects', true, true, true)"
              [attr.aria-current]="isRouteActive('/projects', true) ? 'page' : null"
            >
              All Projects
            </a>
            <a
              [routerLink]="['/projects/professional']"
              (click)="closeMobileMenu()"
              [class]="getMobileLinkClasses('/projects/professional', false, true)"
              [attr.aria-current]="isRouteActive('/projects/professional') ? 'page' : null"
            >
              Professional Projects
            </a>
            <a
              [routerLink]="['/projects/personal']"
              (click)="closeMobileMenu()"
              [class]="getMobileLinkClasses('/projects/personal', false, true)"
              [attr.aria-current]="isRouteActive('/projects/personal') ? 'page' : null"
            >
              Personal Projects
            </a>
          </div>

          <!-- Mobile Theme Toggle and Social Links -->
          <div class="px-4 pt-4 border-t border-stone-200 dark:border-slate-800">
            <div class="flex items-center justify-between mb-4">
              <span class="text-sm font-medium text-slate-500 dark:text-slate-400">Theme</span>
              <app-theme-toggle></app-theme-toggle>
            </div>
            <app-social-links location="nav"></app-social-links>
          </div>
        </div>
      </div>
    }
  </div>
</nav>
