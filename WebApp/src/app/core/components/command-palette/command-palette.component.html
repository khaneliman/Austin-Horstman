@if (isOpen()) {
  <div
    class="command-palette-backdrop fixed inset-0 z-[100] flex items-start justify-center bg-slate-950/40 px-4 pt-24 backdrop-blur-md dark:bg-slate-950/70"
    (click)="onBackdropClick($event)"
    role="presentation"
  >
    <div
      class="command-palette w-full max-w-xl overflow-hidden rounded-2xl border border-stone-200/80 bg-[var(--color-paper)] shadow-[0_30px_80px_-20px_rgba(15,23,42,0.45)] dark:border-slate-800 dark:bg-slate-900"
      role="dialog"
      aria-modal="true"
      aria-label="Command palette"
    >
      <div class="flex items-center gap-3 border-b border-stone-200/80 px-5 py-4 dark:border-slate-800">
        <span class="font-mono text-xs uppercase tracking-[0.22em] text-teal-700 dark:text-teal-300">⌘K</span>
        <input
          #searchInput
          type="text"
          [value]="query()"
          (input)="onQueryChange($any($event.target).value)"
          placeholder="Jump to a page, case study, or project…"
          autocomplete="off"
          spellcheck="false"
          class="flex-1 bg-transparent text-base text-slate-900 placeholder:text-slate-400 focus:outline-none dark:text-slate-50 dark:placeholder:text-slate-500"
        />
        <kbd
          class="hidden font-mono text-[10px] uppercase tracking-widest text-slate-500 sm:inline dark:text-slate-400"
        >
          esc to close
        </kbd>
      </div>

      <div class="max-h-[60vh] overflow-y-auto py-2">
        @if (!results().length) {
          <p class="px-5 py-8 text-center text-sm text-slate-500 dark:text-slate-400">
            No matches. Try a company, project, or page name.
          </p>
        } @else {
          <ul class="flex flex-col gap-0.5 px-2">
            @for (item of results(); track trackEntry($index, item); let i = $index) {
              <li>
                <button
                  type="button"
                  (click)="executeEntry(item.entry)"
                  (mouseenter)="activeIndex.set(i)"
                  [class]="
                    'flex w-full items-center gap-4 rounded-lg px-3 py-2.5 text-left transition-colors duration-75 ' +
                    (activeIndex() === i
                      ? 'bg-teal-100/70 text-teal-950 dark:bg-teal-950/60 dark:text-teal-100'
                      : 'text-slate-700 hover:bg-stone-100 dark:text-slate-200 dark:hover:bg-slate-800/60')
                  "
                >
                  <span class="font-mono text-sm text-teal-700 dark:text-teal-300">{{
                    kindGlyph[item.entry.kind]
                  }}</span>
                  <span class="flex min-w-0 flex-1 flex-col">
                    <span class="truncate text-sm font-medium">
                      @for (seg of item.labelSegments; track $index) {
                        <span [class]="seg.matched ? 'text-teal-700 dark:text-teal-300 font-semibold' : ''">{{
                          seg.text
                        }}</span>
                      }
                    </span>
                    <span class="truncate text-xs text-slate-500 dark:text-slate-400">{{ item.entry.hint }}</span>
                  </span>
                  <span class="font-mono text-[10px] uppercase tracking-[0.18em] text-slate-400 dark:text-slate-500">
                    {{ kindLabel[item.entry.kind] }}
                  </span>
                </button>
              </li>
            }
          </ul>
        }
      </div>

      <div
        class="flex items-center justify-between border-t border-stone-200/80 px-5 py-2.5 font-mono text-[10px] uppercase tracking-[0.18em] text-slate-500 dark:border-slate-800 dark:text-slate-400"
      >
        <span>↑ ↓ navigate · ⏎ open</span>
        <span>{{ results().length }} results</span>
      </div>
    </div>
  </div>
}
