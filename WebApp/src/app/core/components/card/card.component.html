<div
  class="my-5 overflow-hidden rounded-xl border border-stone-200 bg-white shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg dark:border-slate-700 dark:bg-slate-900"
>
  <div class="p-6">
    <div class="flex flex-col gap-6 sm:flex-row sm:items-start">
      <!-- Image section -->
      <div class="w-full flex-shrink-0 sm:w-1/3">
        <div class="relative">
          <img
            alt="{{ title() }}"
            class="h-24 w-full object-contain rounded-xl sm:h-32"
            [class.filter]="imgDark()"
            [class.invert]="imgDark()"
            src="{{ imgSrc() }}"
          />
        </div>
      </div>

      <!-- Content section -->
      <div class="flex-1 min-w-0">
        <h5 class="text-xl font-bold text-teal-800 dark:text-teal-200 mb-3 line-clamp-2">
          {{ title() }}
        </h5>
        <div class="space-y-2">
          <p class="text-slate-700 dark:text-slate-300 leading-relaxed">
            {{ description() }}
          </p>
          @if (superText()) {
            <p class="text-sm text-slate-500 dark:text-slate-400 italic">
              {{ superText() }}
            </p>
          }
        </div>
        @if (link() && linkText()) {
          <a
            [routerLink]="link()"
            class="inline-flex items-center mt-4 text-teal-800 dark:text-teal-200 hover:text-teal-950 dark:hover:text-teal-100 font-medium transition-colors duration-200 group"
          >
            <span>{{ linkText() }}</span>
            <svg
              class="w-4 h-4 ml-2 transition-transform duration-200 group-hover:translate-x-1"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
          </a>
        }
      </div>
    </div>
  </div>
</div>
