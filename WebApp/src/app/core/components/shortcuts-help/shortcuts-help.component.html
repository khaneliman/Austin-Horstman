@if (isOpen()) {
  <div
    class="shortcuts-help-backdrop fixed inset-0 z-[110] flex items-center justify-center bg-slate-950/40 px-4 backdrop-blur-md dark:bg-slate-950/70"
    (click)="onBackdropClick($event)"
    role="presentation"
  >
    <div
      class="shortcuts-help w-full max-w-lg overflow-hidden rounded-2xl border border-stone-200/80 bg-[var(--color-paper)] shadow-[0_30px_80px_-20px_rgba(15,23,42,0.45)] dark:border-slate-800 dark:bg-slate-900"
      role="dialog"
      aria-modal="true"
      aria-labelledby="shortcuts-help-title"
    >
      <div class="flex items-center justify-between border-b border-stone-200/80 px-5 py-4 dark:border-slate-800">
        <div class="flex flex-col">
          <span class="font-mono text-xs uppercase tracking-[0.22em] text-teal-700 dark:text-teal-300">?</span>
          <h2 id="shortcuts-help-title" class="text-lg font-semibold text-slate-900 dark:text-slate-50">
            Keyboard shortcuts
          </h2>
        </div>
        <button
          type="button"
          (click)="close()"
          class="rounded-lg p-1.5 text-slate-500 transition-colors hover:bg-stone-200/60 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-100"
          aria-label="Close keyboard shortcuts"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <div class="max-h-[70vh] space-y-6 overflow-y-auto px-5 py-5">
        @for (group of groups; track group.label) {
          <section>
            <h3 class="mb-3 font-mono text-[10px] uppercase tracking-[0.22em] text-slate-500 dark:text-slate-400">
              {{ group.label }}
            </h3>
            <ul class="flex flex-col gap-1.5">
              @for (binding of group.bindings; track binding.sequence) {
                <li
                  class="flex items-center justify-between gap-4 rounded-lg px-2 py-1.5 text-sm text-slate-700 dark:text-slate-200"
                >
                  <span>{{ binding.description }}</span>
                  <kbd
                    class="rounded-md border border-stone-300 bg-white px-2 py-0.5 font-mono text-xs text-slate-700 shadow-sm dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200"
                  >
                    {{ binding.sequence }}
                  </kbd>
                </li>
              }
            </ul>
          </section>
        }
      </div>

      <div
        class="flex items-center justify-between border-t border-stone-200/80 px-5 py-2.5 font-mono text-[10px] uppercase tracking-[0.18em] text-slate-500 dark:border-slate-800 dark:text-slate-400"
      >
        <span>Press ? to toggle</span>
        <span>Esc to close</span>
      </div>
    </div>
  </div>
}
