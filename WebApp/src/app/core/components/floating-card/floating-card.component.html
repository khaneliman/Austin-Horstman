<div
  class="group overflow-hidden rounded-xl border border-stone-200 bg-white shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg dark:border-slate-700 dark:bg-slate-900"
>
  <div class="p-8">
    <!-- Icon with gradient background -->
    <div
      class="w-14 h-14 rounded-lg flex items-center justify-center mb-6 group-hover:scale-105 transition-transform duration-300"
      [ngClass]="{
        'bg-teal-700': status() === 'primary',
        'bg-emerald-700': status() === 'success',
        'bg-amber-600': status() === 'warning',
        'bg-rose-700': status() === 'danger',
        'bg-slate-800': status() === 'info',
        'bg-slate-700': !status(),
      }"
    >
      <ng-icon [name]="icon()" size="1.5rem" class="dark:!text-white"></ng-icon>
    </div>

    <!-- Title -->
    <h6
      class="text-lg font-bold uppercase tracking-wide mb-2"
      [ngClass]="{
        'text-teal-800 dark:text-teal-200': status() === 'primary',
        'text-emerald-800 dark:text-emerald-200': status() === 'success',
        'text-amber-800 dark:text-amber-200': status() === 'warning',
        'text-rose-800 dark:text-rose-200': status() === 'danger',
        'text-slate-800 dark:text-slate-200': status() === 'info',
        'text-slate-700 dark:text-slate-300': !status(),
      }"
    >
      {{ title() }}
    </h6>

    <!-- Super text -->
    @if (superText()) {
      <p class="text-sm text-slate-600 dark:text-slate-300 italic mb-3">
        {{ superText() }}
      </p>
    }

    <!-- Description -->
    <p class="text-slate-700 dark:text-slate-300 leading-relaxed mb-4">
      {{ description() }}
    </p>

    <!-- Tags -->
    @if (tags() && tags()!.length > 0) {
      <div class="flex flex-wrap gap-2 mb-6">
        @for (tag of tags()!; track tag) {
          <span
            class="px-3 py-1 bg-stone-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-medium rounded-full border border-stone-200 dark:border-slate-700"
          >
            {{ tag }}
          </span>
        }
      </div>
    }

    <!-- Action button -->
    @if (link() && linkText()) {
      <a
        [routerLink]="link()"
        class="inline-flex items-center px-6 py-3 rounded-lg font-semibold transition-all duration-200 hover:-translate-y-0.5 shadow-sm hover:shadow-md"
        [ngClass]="{
          'bg-teal-700 hover:bg-teal-800 text-white': status() === 'primary',
          'bg-emerald-700 hover:bg-emerald-800 text-white': status() === 'success',
          'bg-amber-600 hover:bg-amber-700 text-white': status() === 'warning',
          'bg-rose-700 hover:bg-rose-800 text-white': status() === 'danger',
          'bg-slate-800 hover:bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-950': status() === 'info',
          'bg-slate-700 hover:bg-slate-800 text-white': !status(),
        }"
      >
        <span>{{ linkText() }}</span>
        <svg
          class="w-4 h-4 ml-2 transition-transform duration-200 group-hover:translate-x-1"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </a>
    }
  </div>
</div>
