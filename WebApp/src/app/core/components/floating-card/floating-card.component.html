<div
  class="group overflow-hidden rounded-xl border border-stone-200 border-t-4 bg-white shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg dark:border-slate-700 dark:bg-slate-900"
  [ngClass]="accentBorderClasses"
>
  <div class="p-8">
    <div
      class="w-14 h-14 rounded-lg flex items-center justify-center mb-6 text-white transition-transform duration-300 group-hover:scale-105"
      [ngClass]="iconAccentClasses"
    >
      <ng-icon [name]="icon()" size="1.5rem"></ng-icon>
    </div>

    <h6 class="text-lg font-bold mb-2 text-teal-800 dark:text-teal-200">
      {{ title() }}
    </h6>

    <!-- Super text -->
    @if (superText()) {
      <p class="text-sm text-slate-600 dark:text-slate-300 italic mb-3">
        {{ superText() }}
      </p>
    }

    <!-- Description -->
    <p class="text-slate-700 dark:text-slate-300 leading-relaxed mb-4">
      {{ description() }}
    </p>

    <!-- Tags -->
    @if (tags() && tags()!.length > 0) {
      <div class="flex flex-wrap gap-2 mb-6">
        @for (tag of tags()!; track tag) {
          <span
            class="px-3 py-1 bg-stone-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-medium rounded-full border border-stone-200 dark:border-slate-700"
          >
            {{ tag }}
          </span>
        }
      </div>
    }

    <!-- Action button -->
    @if (link() && linkText()) {
      <a
        [routerLink]="link()"
        class="inline-flex items-center px-6 py-3 rounded-lg bg-teal-700 text-white font-semibold shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:bg-teal-800 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 focus-visible:ring-offset-2 focus-visible:ring-offset-white dark:bg-teal-500/85 dark:hover:bg-teal-400 dark:focus-visible:ring-teal-300 dark:focus-visible:ring-offset-slate-900"
      >
        <span>{{ linkText() }}</span>
        <svg
          class="w-4 h-4 ml-2 transition-transform duration-200 group-hover:translate-x-1"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </a>
    }
  </div>
</div>
